name: Run Company Qualifier

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'Who triggered this run'
        required: false
        default: 'dashboard'

jobs:
  qualify:
    name: Qualify Companies
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install gspread google-auth openai requests beautifulsoup4

      - name: Run qualifier
        env:
          SPREADSHEET_ID:    ${{ secrets.SPREADSHEET_ID }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python qualify.py
